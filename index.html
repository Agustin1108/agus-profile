<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agus</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 167, 38, 0.15), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        .card {
            position: relative;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid rgba(255, 167, 38, 0.2);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 60px rgba(255, 167, 38, 0.05);
        }

        .candle {
            font-size: 48px;
            margin-bottom: 20px;
            animation: flicker 2s ease-in-out infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.8; transform: scale(1); }
            25% { opacity: 1; transform: scale(1.05); }
            50% { opacity: 0.85; transform: scale(0.98); }
            75% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.9; transform: scale(1); }
        }

        .name {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .role {
            font-size: 13px;
            font-weight: 600;
            color: #ffa726;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .bio {
            font-size: 15px;
            font-weight: 300;
            color: #999;
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: rgba(255, 167, 38, 0.4);
            margin: 0 auto 25px;
            border-radius: 2px;
        }

        .location {
            font-size: 13px;
            color: #777;
            margin-bottom: 25px;
        }

        .location::before {
            content: '📍 ';
        }

        .skills {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .skill {
            background: rgba(255, 167, 38, 0.1);
            border: 1px solid rgba(255, 167, 38, 0.2);
            color: #ffa726;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .instagram {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #e0e0e0;
            text-decoration: none;
            font-size: 14px;
            padding: 10px 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .instagram:hover {
            border-color: #ffa726;
            color: #ffa726;
            box-shadow: 0 0 20px rgba(255, 167, 38, 0.15);
        }

        .instagram svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="card">
        <div class="candle">🕯️</div>
        <h1 class="name">Agus</h1>
        <p class="role">Sekretaris Umum DPC KESAN Sinjai</p>
        <p class="bio">"Bukan mentari, hanya sepercik cahaya lilin kecil"</p>
        <div class="divider"></div>
        <p class="location">Sinjai, Sulawesi Selatan, Indonesia</p>
        <div class="skills">
            <span class="skill">Coding</span>
            <span class="skill">Desain</span>
            <span class="skill">Filsafat</span>
        </div>
        <a href="https://instagram.com/agus11082007" target="_blank" class="instagram">

    </div>
</body>
</html>
